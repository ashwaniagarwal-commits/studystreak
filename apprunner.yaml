# AWS App Runner configuration for native Node.js source build (no Docker).
# When you create the App Runner service from your GitHub repo and pick
# "Use a configuration file", App Runner reads this file at the repo root.
#
# Reference: https://docs.aws.amazon.com/apprunner/latest/dg/config-file-ref.html
version: 1.0
runtime: nodejs22
build:
  commands:
    build:
      - npm ci --omit=dev --no-audit --no-fund
run:
  runtime-version: 22
  command: node server/server.js
  network:
    port: 8080
    env: PORT
  env:
    - name: NODE_ENV
      value: production
    - name: LOG_LEVEL
      value: info
    # DATABASE_URL is set as a service-level env var in App Runner console
    # (or via Secrets Manager). Do NOT commit it here.
