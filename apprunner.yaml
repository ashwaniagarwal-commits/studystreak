# AWS App Runner configuration for native Node.js source build (no Docker).
# When you create the App Runner service from your GitHub repo and pick
# "Use a configuration file", App Runner reads this file at the repo root.
#
# Reference: https://docs.aws.amazon.com/apprunner/latest/dg/config-file-ref.html
version: 1.0
runtime: nodejs22
build:
  commands:
    build:
      - npm ci --omit=dev --no-audit --no-fund
run:
  runtime-version: 22
  command: node server/server.js
  network:
    port: 8080
    env: PORT
  env:
    - name: NODE_ENV
      value: production
    - name: LOG_LEVEL
      value: info
    - name: DATABASE_URL
      value: postgresql://postgres:StudyStreak2026Demo@studystreak-db.cluster-cvki64cwid8h.ap-south-1.rds.amazonaws.com:5432/postgres
    - name: ALLOW_RESET
      value: "1"
    # NOTE: DATABASE_URL is committed here for v0 testing only. Repo is private.
    # Rotate the RDS password and move this to AWS Secrets Manager before any
    # real users are onboarded.
